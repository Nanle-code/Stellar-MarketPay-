    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 0

  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 0

  - package-ecosystem: cargo
    directory: /contracts/marketpay-contract
